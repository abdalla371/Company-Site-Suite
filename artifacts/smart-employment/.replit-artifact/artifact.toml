kind = "web"
previewPath = "/"
title = "Smart Employment Service"
version = "1.0.0"
id = "artifacts/smart-employment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18470

[services.development]
run = "pnpm --filter @workspace/smart-employment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-employment", "run", "build" ]
publicDir = "artifacts/smart-employment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18470"
BASE_PATH = "/"
