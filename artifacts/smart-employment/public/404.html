<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Smart Employment Service</title>
    <script>
      // GitHub Pages SPA redirect: preserve the path so the React router can handle it
      var segmentCount = 1; // number of path segments in the repo name (/Smart-Employment)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
