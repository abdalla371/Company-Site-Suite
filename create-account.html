<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="form-page">
  <div class="form-card" style="max-width:560px">
    <h1>Create an account</h1>
    <p class="form-subtitle">Join Somalia's premier employment platform for free</p>
    <form onsubmit="handleRegister(event)">
      <div class="form-group"><label class="form-label">I am a...</label></div>
      <div class="role-selector">
        <label class="role-option">
          <input type="radio" name="role" value="job_seeker" checked>
          <div class="role-box"><h4>Job Seeker</h4><p>Find jobs & internships</p></div>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="employer">
          <div class="role-box"><h4>Employer</h4><p>Post jobs & hire talent</p></div>
        </label>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="fullName">Full name</label>
          <input class="form-input" type="text" id="fullName" placeholder="Your full name" required minlength="2" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone (optional)</label>
          <input class="form-input" type="tel" id="phone" placeholder="+252 61 ..." autocomplete="tel">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary form-submit" id="submit-btn">Create account</button>
    </form>
    <p class="form-footer-text">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('');
if (isLoggedIn()) window.location.href = 'index.html';

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await auth.register({
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      phone: document.getElementById('phone').value,
      role: document.querySelector('input[name="role"]:checked').value,
    });
    setToken(res.token); setCurrentUser(res.user);
    showToast('Account created successfully!', 'success');
    setTimeout(() => window.location.href = 'index.html', 700);
  } catch(err) {
    showToast(err.message || 'Registration failed. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Create account';
  }
}
</script>
</body>
</html>
