<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Internship - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="form-page">
  <div class="form-card" style="max-width:640px">
    <h1>Internship Application</h1>
    <p class="form-subtitle">Complete the form below to apply for our structured internship program.</p>
    <div id="form-area">
      <form onsubmit="handleSubmit(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-input" type="text" id="fullName" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input class="form-input" type="tel" id="phone" placeholder="+252 61 ...">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">University / Institution *</label>
            <input class="form-input" type="text" id="university" placeholder="University name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Field of Study *</label>
            <input class="form-input" type="text" id="fieldOfStudy" placeholder="e.g. Computer Science" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Year of Study</label>
            <select class="form-select" id="yearOfStudy">
              <option value="">Select year...</option>
              <option>1st Year</option><option>2nd Year</option><option>3rd Year</option>
              <option>4th Year</option><option>5th Year</option><option>Graduate</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Available Start Date *</label>
            <input class="form-input" type="date" id="startDate" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">CV / Portfolio Link (Google Drive, LinkedIn, etc.)</label>
          <input class="form-input" type="url" id="cvUrl" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="form-label">Cover Letter</label>
          <textarea class="form-textarea" id="coverLetter" rows="5" placeholder="Tell us about yourself, your goals, and why you want to join this program..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary form-submit" id="submit-btn">Submit Application</button>
      </form>
      <p class="form-footer-text"><a href="internship.html">← Back to Internship Program</a></p>
    </div>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('internship');
async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    await applications.createInternship({
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      university: document.getElementById('university').value,
      fieldOfStudy: document.getElementById('fieldOfStudy').value,
      yearOfStudy: document.getElementById('yearOfStudy').value,
      startDate: document.getElementById('startDate').value,
      cvUrl: document.getElementById('cvUrl').value,
      coverLetter: document.getElementById('coverLetter').value,
    });
    document.getElementById('form-area').innerHTML = `
      <div class="success-card">
        <div style="font-size:52px">🎉</div>
        <h2>Application Submitted!</h2>
        <p>Thank you! We will review your application and contact you within 5–7 business days.</p>
        <a href="internship.html" class="btn btn-primary">Back to Internship Program</a>
      </div>`;
  } catch(err) {
    showToast(err.message || 'Submission failed. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Submit Application';
  }
}
</script>
</body>
</html>
