<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Shaqo-Tag - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="form-page">
  <div class="form-card" style="max-width:640px">
    <h1>Shaqo-Tag Application</h1>
    <p class="form-subtitle">Apply for a short-term work attachment in your preferred sector.</p>
    <div id="form-area">
      <form onsubmit="handleSubmit(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-input" type="text" id="fullName" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input class="form-input" type="tel" id="phone" placeholder="+252 61 ...">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Current Occupation *</label>
            <input class="form-input" type="text" id="occupation" placeholder="e.g. Accountant, Student..." required>
          </div>
          <div class="form-group">
            <label class="form-label">Preferred Sector</label>
            <select class="form-select" id="preferredSector">
              <option value="">Select sector...</option>
              <option>Banking &amp; Finance</option><option>Telecommunications &amp; IT</option>
              <option>Healthcare</option><option>Education</option><option>Logistics</option>
              <option>Government &amp; Public Sector</option><option>Media &amp; Communications</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Work Experience *</label>
          <textarea class="form-textarea" id="experience" rows="4" placeholder="Describe your work experience, even if limited or informal..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Key Skills</label>
          <input class="form-input" type="text" id="skills" placeholder="e.g. MS Office, Customer service, Driving license...">
        </div>
        <div class="form-group">
          <label class="form-label">CV / Portfolio Link (optional)</label>
          <input class="form-input" type="url" id="cvUrl" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="form-label">Why do you want to join Shaqo-Tag?</label>
          <textarea class="form-textarea" id="coverLetter" rows="4" placeholder="Tell us your motivation and what you hope to achieve..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary form-submit" id="submit-btn">Submit Application</button>
      </form>
      <p class="form-footer-text"><a href="shaqotag.html">← Back to Shaqo-Tag Program</a></p>
    </div>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('shaqotag');
async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    await applications.createShaqotag({
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      occupation: document.getElementById('occupation').value,
      experience: document.getElementById('experience').value,
      skills: document.getElementById('skills').value,
      preferredSector: document.getElementById('preferredSector').value,
      cvUrl: document.getElementById('cvUrl').value,
      coverLetter: document.getElementById('coverLetter').value,
    });
    document.getElementById('form-area').innerHTML = `
      <div class="success-card">
        <div style="font-size:52px">🎉</div>
        <h2>Application Submitted!</h2>
        <p>Thank you for applying to Shaqo-Tag! We will be in touch within 5 business days.</p>
        <a href="shaqotag.html" class="btn btn-primary">Back to Shaqo-Tag</a>
      </div>`;
  } catch(err) {
    showToast(err.message || 'Submission failed. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Submit Application';
  }
}
</script>
</body>
</html>
