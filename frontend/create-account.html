<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Smart Employment Service</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="form-page">
  <div class="form-card">
    <h1>Create your account</h1>
    <p class="subtitle">Join Somalia's premier employment platform for free</p>
    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group"><label>I am a...</label></div>
      <div class="role-selector">
        <label class="role-option">
          <input type="radio" name="role" value="job_seeker" checked>
          <div class="role-box"><h4>Job Seeker</h4><p>Find jobs & internships</p></div>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="employer">
          <div class="role-box"><h4>Employer</h4><p>Post jobs & hire talent</p></div>
        </label>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" id="fullName" placeholder="Your full name" required minlength="2"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+252 61 ..."></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6"></div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Create Account</button>
    </form>
    <div class="form-footer">Already have an account? <a href="login.html">Log In</a></div>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('');
if (isLoggedIn()) window.location.href = 'index.html';

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const role = document.querySelector('input[name="role"]:checked').value;
  try {
    const res = await auth.register({
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      phone: document.getElementById('phone').value,
      role,
    });
    setToken(res.token); setCurrentUser(res.user);
    showToast('Account created successfully!', 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch(err) {
    showToast(err.message || 'Registration failed. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
</script>
</body></html>
