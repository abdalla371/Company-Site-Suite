<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Details - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="page"></div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('jobs'); renderFooter();

async function load() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = 'jobs.html'; return; }
  const el = document.getElementById('page');
  el.innerHTML = '<div class="loading" style="padding-top:80px"><div class="spinner"></div><p>Loading job...</p></div>';
  try {
    const j = await jobs.get(id);
    document.title = `${j.title} at ${j.companyName} - Smart Employment Service`;
    el.innerHTML = `
      <div class="page-hero">
        <div class="page-hero-dots"></div>
        <div class="page-hero-inner">
          <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
            <div class="company-logo-box" style="width:64px;height:64px;border-radius:14px;border-color:rgba(255,255,255,0.15)">
              <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/></svg>
            </div>
            <div>
              <h1 style="font-size:clamp(22px,4vw,36px);font-weight:700;margin-bottom:6px;letter-spacing:-0.02em">${j.title}</h1>
              <p style="color:rgba(255,255,255,0.75);font-size:16px">${j.companyName}</p>
            </div>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <span class="badge-outline" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              ${j.location}
            </span>
            <span class="badge-outline" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${formatJobType(j.type)}
            </span>
            ${j.salary ? `<span class="badge-outline" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)"><svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> ${j.salary}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="section">
        <div class="container">
          <div style="display:grid;grid-template-columns:2fr 1fr;gap:32px;align-items:start">
            <div>
              <div class="info-card">
                <h3 style="font-size:18px;margin-bottom:16px">Job Description</h3>
                <p style="font-size:15px;line-height:1.75;white-space:pre-wrap">${j.description}</p>
              </div>
              ${j.requirements ? `<div class="info-card" style="margin-top:16px"><h3 style="font-size:18px;margin-bottom:16px">Requirements</h3><p style="font-size:15px;line-height:1.75;white-space:pre-wrap">${j.requirements}</p></div>` : ''}
            </div>
            <div>
              <div class="info-card" style="background:var(--primary);border-color:transparent;color:var(--primary-fg)">
                <h3 style="color:var(--secondary);margin-bottom:12px">Apply Now</h3>
                <p style="color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:20px;line-height:1.6">Submit your application for this position today.</p>
                ${isLoggedIn()
                  ? `<button onclick="applyToJob('${j.title}','${j.companyName}')" class="btn btn-secondary" style="width:100%">Apply for this Job</button>`
                  : `<a href="login.html" class="btn btn-secondary" style="width:100%;display:flex">Log in to Apply</a>`}
              </div>
              <div class="info-card" style="margin-top:16px">
                <h3 style="font-size:15px;margin-bottom:16px">Job Details</h3>
                <table style="width:100%;border-collapse:collapse">
                  ${[['Category',j.category],['Type',formatJobType(j.type)],['Location',j.location],['Posted',formatDate(j.createdAt)]].map(([k,v])=>`
                  <tr><td style="padding:8px 0;font-size:13px;font-weight:600;color:var(--muted-fg);width:80px">${k}</td><td style="padding:8px 0;font-size:13px;color:var(--fg)">${v}</td></tr>`).join('')}
                </table>
              </div>
              <a href="jobs.html" class="btn btn-outline" style="width:100%;margin-top:16px;display:flex;justify-content:center">← Back to Jobs</a>
            </div>
          </div>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="section"><div class="container"><div class="empty">Job not found. <a href="jobs.html" class="btn btn-primary btn-sm" style="margin-top:16px;display:inline-flex">Back to Jobs</a></div></div></div>`;
  }
}

function applyToJob(title, company) {
  showToast(`Application sent for "${title}" at ${company}!`, 'success');
}
load();
</script>
</body>
</html>
