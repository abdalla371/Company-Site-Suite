<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-hero">
  <div class="page-hero-dots"></div>
  <div class="page-hero-inner">
    <h1>Browse <span class="gold">Jobs</span></h1>
    <p>Find your next opportunity from top companies across Somalia</p>
  </div>
</div>

<div class="section">
  <div class="container">
    <div class="search-bar">
      <input class="search-input" type="text" id="search" placeholder="Search job title, company, keyword...">
      <select class="search-input" id="filter-type" style="flex:0;min-width:150px">
        <option value="">All Types</option>
        <option value="full_time">Full-time</option>
        <option value="part_time">Part-time</option>
        <option value="contract">Contract</option>
        <option value="internship">Internship</option>
        <option value="remote">Remote</option>
      </select>
      <select class="search-input" id="filter-category" style="flex:0;min-width:170px">
        <option value="">All Categories</option>
        <option value="IT">IT & Technology</option>
        <option value="Finance">Finance & Banking</option>
        <option value="Marketing">Marketing</option>
        <option value="Customer Service">Customer Service</option>
        <option value="Human Resources">Human Resources</option>
        <option value="Design">Design</option>
        <option value="Logistics">Logistics</option>
        <option value="Healthcare">Healthcare</option>
      </select>
      <input class="search-input" type="text" id="filter-location" placeholder="Location..." style="flex:0;min-width:130px">
      <button class="btn btn-primary" onclick="doSearch()">Search</button>
    </div>
    <div id="results"><div class="loading"><div class="spinner"></div><p>Loading jobs...</p></div></div>
  </div>
</div>

<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('jobs'); renderFooter();

// Pre-fill from URL query
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('search')) document.getElementById('search').value = urlParams.get('search');

async function doSearch() {
  const el = document.getElementById('results');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching...</p></div>';
  try {
    const data = await jobs.list({
      search: document.getElementById('search').value.trim(),
      type: document.getElementById('filter-type').value,
      category: document.getElementById('filter-category').value,
      location: document.getElementById('filter-location').value.trim(),
    });
    if (!data.length) {
      el.innerHTML = '<div class="empty" style="border:1px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;color:var(--muted-fg)">No jobs found matching your search. Try different keywords or filters.</div>';
      return;
    }
    el.innerHTML = `<p style="font-size:14px;color:var(--muted-fg);margin-bottom:20px">${data.length} job${data.length !== 1 ? 's' : ''} found</p><div class="jobs-grid">${data.map(j => jobCardHTML(j)).join('')}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty" style="border:1px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;color:var(--muted-fg)">Could not connect to the server. Please try again later.<br><small style="margin-top:8px;display:block">${e.message}</small></div>`;
  }
}

document.getElementById('search').addEventListener('keydown', e => e.key === 'Enter' && doSearch());
doSearch();
</script>
</body>
</html>
