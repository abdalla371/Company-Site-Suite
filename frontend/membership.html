<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Plans - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-hero">
  <div class="page-hero-dots"></div>
  <div class="page-hero-inner">
    <h1><span class="gold">Membership</span> Plans</h1>
    <p>Unlock premium features, priority job access, career coaching, and exclusive networking opportunities.</p>
  </div>
</div>

<div class="section">
  <div class="container">
    <div id="plans-grid"><div class="loading"><div class="spinner"></div><p>Loading plans...</p></div></div>
  </div>
</div>

<!-- Signup form (shown after selecting a plan) -->
<div id="signup-wrap" style="display:none;background:var(--muted);padding:0 0 80px">
  <div class="container" style="max-width:540px;margin:0 auto;padding-top:48px">
    <div class="form-card" style="max-width:100%">
      <h1 id="form-title">Join Plan</h1>
      <p class="form-subtitle">Complete your membership signup below.</p>
      <div id="plan-info" style="background:var(--muted);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;font-size:14px;color:var(--muted-fg)"></div>
      <form onsubmit="handleSignup(event)">
        <input type="hidden" id="plan-id">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" type="text" id="fullName" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="form-input" type="tel" id="phone" placeholder="+252 61 ..." required>
        </div>
        <button type="submit" class="btn btn-primary form-submit" id="submit-btn">Complete Membership Signup</button>
        <button type="button" class="btn btn-outline form-submit" style="margin-top:8px" onclick="document.getElementById('signup-wrap').style.display='none'">Cancel</button>
      </form>
    </div>
  </div>
</div>

<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('membership'); renderFooter();
let plansData = [];

async function load() {
  const el = document.getElementById('plans-grid');
  try {
    plansData = await memberships.plans();
    if (!plansData.length) { el.innerHTML = '<div class="empty"><p>No plans available.</p></div>'; return; }
    el.innerHTML = `<div class="plans-grid">${plansData.map(p => `
      <div class="plan-card ${p.isPopular ? 'popular' : ''}">
        ${p.isPopular ? '<div class="plan-badge-top">Most Popular</div>' : ''}
        <div class="plan-name">${p.name}</div>
        <div class="plan-price">
          <span class="plan-amount">$${p.price}</span>
          <span class="plan-duration"> / ${p.duration}</span>
        </div>
        <div class="plan-features">${p.features.map(f => `<div class="plan-feature"><span class="check-icon">✓</span><span>${f}</span></div>`).join('')}</div>
        <button class="btn ${p.isPopular ? 'btn-secondary' : 'btn-outline'}" style="width:100%" onclick="selectPlan(${p.id})">Get ${p.name}</button>
      </div>`).join('')}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>Could not load plans. Please try again.</p></div>`;
  }
}

function selectPlan(planId) {
  const p = plansData.find(x => x.id === planId);
  if (!p) return;
  document.getElementById('plan-id').value = planId;
  document.getElementById('form-title').textContent = `Join ${p.name} Plan`;
  document.getElementById('plan-info').innerHTML = `<strong>${p.name} Plan</strong> — $${p.price} / ${p.duration}`;
  const wrap = document.getElementById('signup-wrap');
  wrap.style.display = 'block';
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Processing...';
  try {
    await memberships.create({
      planId: parseInt(document.getElementById('plan-id').value),
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
    });
    document.getElementById('signup-wrap').innerHTML = `
      <div class="container" style="max-width:540px;margin:0 auto;padding:48px 32px">
        <div class="form-card success-card" style="max-width:100%">
          <div style="font-size:52px">🌟</div>
          <h2>Welcome to Smart Employment!</h2>
          <p>Your membership is confirmed. Our team will contact you with your welcome package shortly.</p>
          <a href="index.html" class="btn btn-primary">Go to Homepage</a>
        </div>
      </div>`;
  } catch(err) {
    showToast(err.message || 'Signup failed. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Complete Membership Signup';
  }
}
load();
</script>
</body>
</html>
