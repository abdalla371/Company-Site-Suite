<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="form-page">
  <div class="form-card" style="max-width:680px">
    <h1>Post a Job</h1>
    <p class="form-subtitle">Reach thousands of qualified Somali job seekers — post your listing in minutes.</p>
    <div id="form-area">
      <form onsubmit="handleSubmit(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Job Title *</label>
            <input class="form-input" type="text" id="title" placeholder="e.g. Senior Accountant" required>
          </div>
          <div class="form-group">
            <label class="form-label">Company Name *</label>
            <input class="form-input" type="text" id="companyName" placeholder="Your company name" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Location *</label>
            <input class="form-input" type="text" id="location" placeholder="e.g. Mogadishu, Somalia" required>
          </div>
          <div class="form-group">
            <label class="form-label">Job Type *</label>
            <select class="form-select" id="type" required>
              <option value="">Select type...</option>
              <option value="full_time">Full-time</option>
              <option value="part_time">Part-time</option>
              <option value="contract">Contract</option>
              <option value="internship">Internship</option>
              <option value="remote">Remote</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category *</label>
            <select class="form-select" id="category" required>
              <option value="">Select category...</option>
              <option value="IT">IT &amp; Technology</option>
              <option value="Finance">Finance &amp; Banking</option>
              <option value="Marketing">Marketing</option>
              <option value="Customer Service">Customer Service</option>
              <option value="Human Resources">Human Resources</option>
              <option value="Design">Design &amp; Creative</option>
              <option value="Logistics">Logistics &amp; Supply Chain</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Education">Education &amp; Training</option>
              <option value="Engineering">Engineering</option>
              <option value="Legal">Legal &amp; Compliance</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Salary / Range</label>
            <input class="form-input" type="text" id="salary" placeholder="e.g. $400–$600/month">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Job Description *</label>
          <textarea class="form-textarea" id="description" rows="6" placeholder="Describe the role, responsibilities, and what a typical day looks like..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Requirements</label>
          <textarea class="form-textarea" id="requirements" rows="4" placeholder="List qualifications, skills, and experience needed..."></textarea>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px">
          <input type="checkbox" id="isFeatured" style="width:16px;height:16px;accent-color:var(--primary);cursor:pointer">
          <label for="isFeatured" style="font-size:14px;font-weight:500;color:var(--fg);cursor:pointer">Feature this job (shown at the top of listings)</label>
        </div>
        <button type="submit" class="btn btn-primary form-submit" id="submit-btn">Post Job Listing</button>
      </form>
    </div>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('');
async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Posting job...';
  try {
    await jobs.create({
      title: document.getElementById('title').value,
      companyName: document.getElementById('companyName').value,
      location: document.getElementById('location').value,
      type: document.getElementById('type').value,
      category: document.getElementById('category').value,
      salary: document.getElementById('salary').value,
      description: document.getElementById('description').value,
      requirements: document.getElementById('requirements').value,
      isFeatured: document.getElementById('isFeatured').checked,
    });
    document.getElementById('form-area').innerHTML = `
      <div class="success-card">
        <div style="font-size:52px">🚀</div>
        <h2>Job Posted Successfully!</h2>
        <p>Your listing is now live and visible to thousands of Somali job seekers.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <a href="jobs.html" class="btn btn-primary">View All Jobs</a>
          <a href="post-job.html" class="btn btn-outline">Post Another Job</a>
        </div>
      </div>`;
  } catch(err) {
    showToast(err.message || 'Failed to post job. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Post Job Listing';
  }
}
</script>
</body>
</html>
