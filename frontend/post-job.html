<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job - Smart Employment Service</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="form-page" style="padding-bottom:80px">
  <div class="form-card" style="max-width:720px">
    <h1>📢 Post a Job</h1>
    <p class="subtitle">Reach thousands of qualified Somali job seekers — post your job in minutes.</p>
    <form id="job-form" onsubmit="handleSubmit(event)">
      <div class="form-row">
        <div class="form-group"><label>Job Title *</label><input type="text" id="title" placeholder="e.g. Senior Accountant" required></div>
        <div class="form-group"><label>Company Name *</label><input type="text" id="companyName" placeholder="Your company name" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Location *</label><input type="text" id="location" placeholder="e.g. Mogadishu, Somalia" required></div>
        <div class="form-group">
          <label>Job Type *</label>
          <select id="type" required>
            <option value="">Select type...</option>
            <option value="full_time">Full-time</option>
            <option value="part_time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="internship">Internship</option>
            <option value="remote">Remote</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select id="category" required>
            <option value="">Select category...</option>
            <option value="IT">IT & Technology</option>
            <option value="Finance">Finance & Banking</option>
            <option value="Marketing">Marketing</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Human Resources">Human Resources</option>
            <option value="Design">Design & Creative</option>
            <option value="Logistics">Logistics & Supply Chain</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Education">Education & Training</option>
            <option value="Engineering">Engineering</option>
            <option value="Legal">Legal & Compliance</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group"><label>Salary / Range</label><input type="text" id="salary" placeholder="e.g. $400-$600/month"></div>
      </div>
      <div class="form-group"><label>Job Description *</label><textarea id="description" rows="6" placeholder="Describe the role, responsibilities, and what a typical day looks like..." required></textarea></div>
      <div class="form-group"><label>Requirements</label><textarea id="requirements" rows="4" placeholder="List qualifications, skills, and experience needed..."></textarea></div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600">
          <input type="checkbox" id="isFeatured" style="width:18px;height:18px">
          Feature this job (displays at top of listings)
        </label>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Post Job Listing</button>
    </form>
    <div class="form-footer">Manage your jobs at <a href="index.html">Smart Employment</a></div>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('');

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Posting job...';
  try {
    await jobs.create({
      title: document.getElementById('title').value,
      companyName: document.getElementById('companyName').value,
      location: document.getElementById('location').value,
      type: document.getElementById('type').value,
      category: document.getElementById('category').value,
      salary: document.getElementById('salary').value,
      description: document.getElementById('description').value,
      requirements: document.getElementById('requirements').value,
      isFeatured: document.getElementById('isFeatured').checked,
    });
    document.getElementById('job-form').innerHTML = `
      <div style="text-align:center;padding:40px 0">
        <div style="font-size:56px;margin-bottom:16px">🚀</div>
        <h2 style="color:var(--navy);margin-bottom:12px">Job Posted Successfully!</h2>
        <p style="color:var(--gray-600);margin-bottom:24px">Your job listing is now live and visible to thousands of Somali job seekers.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <a href="jobs.html" class="btn btn-primary">View All Jobs</a>
          <a href="post-job.html" class="btn btn-navy">Post Another Job</a>
        </div>
      </div>`;
  } catch(err) {
    showToast(err.message || 'Failed to post job. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Post Job Listing';
  }
}
</script>
</body></html>
