<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Smart Employment Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="form-page">
  <div class="form-card">
    <h1>Welcome back</h1>
    <p class="form-subtitle">Sign in to your Smart Employment account</p>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary form-submit" id="submit-btn">Log in</button>
    </form>
    <p class="form-footer-text">Don't have an account? <a href="create-account.html">Sign up</a></p>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('');
if (isLoggedIn()) window.location.href = 'index.html';

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const res = await auth.login({ email: document.getElementById('email').value, password: document.getElementById('password').value });
    setToken(res.token); setCurrentUser(res.user);
    showToast(`Welcome back, ${res.user.fullName.split(' ')[0]}!`, 'success');
    setTimeout(() => window.location.href = 'index.html', 700);
  } catch(err) {
    showToast(err.message || 'Invalid email or password.', 'error');
    btn.disabled = false; btn.textContent = 'Log in';
  }
}
</script>
</body>
</html>
