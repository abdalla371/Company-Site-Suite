<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Employment Service</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="form-page">
  <div class="form-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your Smart Employment account</p>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Log In</button>
    </form>
    <div class="form-footer">Don't have an account? <a href="create-account.html">Sign Up</a></div>
  </div>
</div>
<script src="config.js"></script><script src="script.js"></script><script src="integration.js"></script>
<script>
renderNavbar('');
if (isLoggedIn()) window.location.href = 'index.html';

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const res = await auth.login({ email: document.getElementById('email').value, password: document.getElementById('password').value });
    setToken(res.token); setCurrentUser(res.user);
    showToast(`Welcome back, ${res.user.fullName.split(' ')[0]}!`, 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch(err) {
    showToast(err.message || 'Login failed. Please check your credentials.', 'error');
    btn.disabled = false; btn.textContent = 'Log In';
  }
}
</script>
</body></html>
