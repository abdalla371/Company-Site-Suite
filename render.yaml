services:
  - type: web
    name: smart-employment-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: smart-employment-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: smart-employment-db
    databaseName: smart_employment
    plan: free
    region: oregon
