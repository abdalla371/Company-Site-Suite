services:
  - type: web
    name: smart-employment-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: smart-employment-db
          property: connectionString
    autoDeploy: true

databases:
  - name: smart-employment-db
    plan: free
    databaseName: smart_employment
    user: smart_employment_user
